<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | VisionEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><a href="index.html">VISIONEASE</a></div>
    <div class="nav-links">
      <a href="index.html">Works</a>
      <a href="spectacles.html">Spectacles</a>
      <a href="lenses.html">Lenses</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact Us</a>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <a href="cart.html" class="nav-btn" style="border:none;">CART (2)</a>
      <a href="login.html" class="nav-btn">LOGIN</a>
      <a href="signup.html" class="nav-btn" style="background:var(--white); color:var(--navy);">SIGNUP</a>
    </div>
  </nav>

  <section class="hero hover-trigger">
    <video autoplay muted loop playsinline class="hero-video">
      <source src="videos copy/specs2.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content" style="align-items: center; justify-content: center; padding-top: 100px;">
      <h1 class="hero-title reveal" style="font-size: 5rem; margin-bottom: 24px;">YOUR CART</h1>
      
      <!-- Simulated Cart Items inside HTML -->
      <div class="reveal" style="width: 100%; max-width: 800px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 8px; text-align: left;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 20px;">
          <div style="display: flex; gap: 20px; align-items: center;">
            <img src="images copy/specs1.jpg" alt="Aura Frames" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
            <div>
              <h3 style="font-family: var(--font-anton); font-size: 1.5rem; letter-spacing: 0.05em;">Aura Frames</h3>
              <p style="color: var(--sage);">Quantity: 1</p>
            </div>
          </div>
          <div style="font-weight: 600; font-size: 1.2rem;">$120.00</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 20px;">
          <div style="display: flex; gap: 20px; align-items: center;">
            <img src="images copy/lens1.jpg" alt="Focus Lenses" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
            <div>
              <h3 style="font-family: var(--font-anton); font-size: 1.5rem; letter-spacing: 0.05em;">Focus Lenses</h3>
              <p style="color: var(--sage);">Quantity: 1</p>
            </div>
          </div>
          <div style="font-weight: 600; font-size: 1.2rem;">$299.00</div>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-family: var(--font-anton); font-size: 2rem; margin-top: 30px; letter-spacing: 0.05em;">
          <span>TOTAL:</span>
          <span>$419.00</span>
        </div>
        
        <div style="margin-top: 40px; text-align: right;">
          <a href="#" class="nav-btn" style="background:var(--white); color:var(--navy); padding: 16px 32px; font-weight:600; font-size: 1rem; border: none; cursor: pointer; display: inline-block;">CHECKOUT</a>
        </div>
      </div>
      
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
